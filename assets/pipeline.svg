    <rect x="580" y="32" width="196" height="96" rx="14" fill="#161B22" stroke="#3DDC97" stroke-width="1.5"/>
    <text x="678" y="60" fill="#8B949E" font-size="12" letter-spacing="2">03</text>
    <text x="678" y="86" fill="#F0F6FC" font-size="18" font-weight="700">Stabilize</text>
    <text x="678" y="108" fill="#8B949E" font-size="12">anti-flaky · waits</text>

    <line x1="784" y1="80" x2="814" y2="80" stroke="#3DDC97" stroke-width="2" stroke-linecap="round"/>
    <polygon points="814,74 828,80 814,86" fill="#3DDC97"/>

